<!DOCTYPE html>
<html>
<body>
  <p>Hola {{ user.get_username }},</p>
  <p>Recibimos una solicitud para restablecer tu contraseña en <strong>Diabetes Predictor</strong>.</p>
  <p>
    Haz clic en el botón para elegir una nueva contraseña:
  </p>
  <p>
    <a href="{{ protocol }}://{{ domain }}{% url 'diabetes_app:password_reset_confirm' uidb64=uid token=token %}"
       style="background:#0d6efd;color:#fff;padding:10px 16px;text-decoration:none;border-radius:6px;display:inline-block;">
      Restablecer contraseña
    </a>
  </p>
  <p>Si no solicitaste este cambio, puedes ignorar este correo. El enlace expirará automáticamente.</p>
</body>
</html>
