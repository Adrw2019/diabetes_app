<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesion | Diabetes Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #eef0f4; min-height: 100vh; }
    .wrapper { min-height: 100vh; }
    .brand-panel {
      background: linear-gradient(160deg, #6673d9, #6b48b1);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .brand-content { max-width: 360px; text-align: center; }
    .brand-content h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; }
    .login-panel { display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { width: 100%; max-width: 520px; border: 0; box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08); }
    .btn-primary { background: #1f6feb; border-color: #1f6feb; }
  </style>
</head>
<body>
<div class="container-fluid wrapper">
  <div class="row g-0 wrapper">
    <div class="col-lg-6 d-none d-lg-flex brand-panel">
      <div class="brand-content">
        <h1>Diabetes Predictor</h1>
        <p class="lead mb-0">Predice el riesgo de diabetes con inteligencia artificial.</p>
      </div>
    </div>
    <div class="col-lg-6 login-panel">
      <div class="card login-card">
        <div class="card-body p-4 p-md-5">
          <h2 class="h2 mb-1">Iniciar sesion</h2>
          <p class="text-secondary mb-4">Ingresa con tu usuario y contrasena.</p>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <form method="post" action="/login/">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold" for="username">Usuario</label>
              <input id="username" name="username" class="form-control" placeholder="Tu usuario" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="password">Contrasena</label>
              <input id="password" name="password" type="password" class="form-control" placeholder="Tu contrasena" required>
            </div>
            <a href="#" class="small text-decoration-none">Olvidaste tu contrasena?</a>
            <button class="btn btn-primary w-100 mt-3" type="submit">Iniciar sesion</button>
            <p class="text-center text-secondary mt-4 mb-0 small">
              No tienes cuenta? <a href="/register/" class="fw-semibold">Registrate aqui</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
