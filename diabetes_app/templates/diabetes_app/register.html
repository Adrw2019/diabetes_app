<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro | Diabetes Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #eef0f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .register-card { width: 100%; max-width: 560px; border: 0; box-shadow: 0 8px 24px rgba(17, 24, 39, 0.1); }
    .btn-primary { background: #1f6feb; border-color: #1f6feb; }
  </style>
</head>
<body>
  <div class="card register-card">
    <div class="card-body p-4 p-md-5">
      <h2 class="h2 mb-4">Crear cuenta</h2>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger py-2" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" action="/register/">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="username">Usuario</label>
          <input id="username" name="username" class="form-control" placeholder="Usuario" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email</label>
          <input id="email" name="email" type="email" class="form-control" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">Contrasena</label>
          <input id="password" name="password" type="password" class="form-control" placeholder="Contrasena" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="confirm_password">Confirmar contrasena</label>
          <input id="confirm_password" name="confirm_password" type="password" class="form-control" placeholder="Repetir contrasena" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Registrarse</button>
        <p class="text-center text-secondary mt-3 mb-0 small">
          Ya tienes cuenta? <a href="/login/" class="fw-semibold">Inicia sesion</a>
        </p>
      </form>
    </div>
  </div>
</body>
</html>
